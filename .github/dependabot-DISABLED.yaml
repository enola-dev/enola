version: 2
# TODO https://github.com/dependabot/dependabot-core/issues/11705
updates:
  - package-ecosystem: "github-actions"
    commit-message:
      prefix: "deps: "
    directory: "/"
    schedule:
      interval: "monthly"
      day: monday
      time: "04:00"
    open-pull-requests-limit: 99
  - package-ecosystem: "pip"
    commit-message:
      prefix: "deps: "
    directory: "/"
    schedule:
      interval: "monthly"
      day: monday
      time: "04:00"
    open-pull-requests-limit: 99
  - package-ecosystem: "devcontainers"
    commit-message:
      prefix: "deps: "
    directory: "/"
    schedule:
      interval: "monthly"
      day: monday
      time: "04:00"
    open-pull-requests-limit: 99
  - package-ecosystem: "bun"
    commit-message:
      prefix: "deps: "
    directory: "web/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 99
